name: Build Augustus Multiplayer (Linux & Windows)

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]

    steps:
      - uses: actions/checkout@v3

      # Para Linux: instalar dependências e compilar
      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libsdl2-dev libsdl2-mixer-dev libpng-dev zlib1g-dev
      - name: Configure & build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cmake -S . -B build -DENABLE_MULTIPLAYER=ON
          cmake --build build --config Release
      - name: Upload artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: augustus-linux
          path: build/augustus  # ajuste se o binário tiver nome diferente

      # Para Windows: usar MSYS2/MinGW e compilar
      - name: Setup MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_mixer
            mingw-w64-x86_64-libpng
      - name: Configure & build (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G "MinGW Makefiles" -DENABLE_MULTIPLAYER=ON
          cmake --build build --config Release
      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: augustus-windows
          path: build/augustus.exe  # ajuste se o executável tiver nome diferente